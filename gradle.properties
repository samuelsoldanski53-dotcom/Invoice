# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from the
# command line, check the file location and edit it if you can.
# (The "java -version" output should show a Java version of 1.8 or greater)
# See https://gradle.org/docs/current/userguide/build_environment.html
# Specifies the JVM arguments used for the daemon process.
# The setting is particularly useful for headless machines. See also
# http://developer.android.com/tools/publishing/versioning.html
# ATTENTION: This file is automatically generated by Android Studio.
# Do not modify this file -- YOUR CHANGES WILL BE ERASED!
# This file must *NOT* be checked into Version Control Systems,
# as it contains information specific to your local configuration file (SDK path, etc)
#
# Location of the SDK. This is only used by Gradle.
# For customization when using a Version Control System, please read the
# header note.
#Fri Apr 11 2026 12:00:00 GMT+0300
sdk.dir=/path/to/android/sdk

# Gradle optimization
org.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.daemon=true

# Kotlin
kotlin.code.style=official

# Android
android.useAndroidX=true
android.enableJetifier=true
android.enableBuildCache=true

# Compose
android.enableCompose=true

# R8/ProGuard
android.enableR8=true
android.enableProguard=true

# Suppress warnings
android.suppressUnsupportedCompileSdk=34
